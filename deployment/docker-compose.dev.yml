services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-worldos}
      POSTGRES_USER: ${DB_USERNAME:-worldos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - worldos_dev_pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-worldos}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - worldos_dev_redisdata:/data
    networks:
      - internal
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
      dockerfile: ../deployment/backend.prod.Dockerfile
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY:-base64:devplaceholderkey0000000000000000000000=}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-worldos}
      DB_USERNAME: ${DB_USERNAME:-worldos}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: database
      LOG_CHANNEL: stack
      SIMULATION_ENGINE_GRPC_URL: http://engine:50052
    volumes:
      - ../backend:/var/www
      - backend_public:/var/www/public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
    command: >
      sh -lc "
      (test -f .env || cp .env.example .env) &&
      composer install &&
      (grep -q '^APP_KEY=base64:' .env || php artisan key:generate --force) &&
      php artisan migrate --force &&
      if [ ! -f storage/app/.demo_inited ]; then php artisan db:seed --force && php artisan worldos:demo-scenario && touch storage/app/.demo_inited; fi &&
      php-fpm
      "
    ports:
      - "9000:9000"

  engine:
    build: ../engine
    restart: unless-stopped
    environment:
      GRPC_ADDR: 0.0.0.0:50051
      HTTP_ADDR: 0.0.0.0:50052
    depends_on:
      - postgres
    networks:
      - internal
    ports:
      - "50052:50052"
      - "50051:50051"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - backend_public:/var/www/public:ro
    depends_on:
      - backend
    networks:
      - internal
    ports:
      - "8080:80"

  centrifugo:
    image: centrifugo/centrifugo:v5
    restart: unless-stopped
    command: centrifugo --config=config.json
    environment:
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_KEY:-api_key}
      CENTRIFUGO_SECRET: ${CENTRIFUGO_SECRET:-secret}
      CENTRIFUGO_HMAC_SECRET: ${CENTRIFUGO_HMAC_SECRET:-hmac_secret}
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json
    networks:
      - internal
    ports:
      - "8000:8000"

volumes:
  worldos_dev_pgdata:
  worldos_dev_redisdata:
  backend_public:

networks:
  internal:
    driver: bridge

